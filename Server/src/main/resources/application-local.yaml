logging:
  level:
    com.roomtour: DEBUG

butler:
  ros2: pp
    enabled: true
  recognition:
    window-size: 5
    threshold-percent: 0.80
  voice:
    enabled: true
    whisper-url: http://localhost:8000
    espeak-binary: "C:\\Program Files\\eSpeak NG\\espeak-ng.exe"
    silence-duration-ms: 800
    silence-threshold: 500
    logprob-threshold: -1.0
    max-duration-ms: 15000
    sample-rate-hz: 16000
    wake-phrase: "hey jeeves"
    sleep-phrase: "that is all jeeves"
    inactivity-timeout-ms: 6000
  briefings:
    morning-cron: "0 0 8 * * *"
    evening-cron: "0 0 18 * * *"
