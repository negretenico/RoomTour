name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-assistant:
    uses: negretenico/GithubWorkflows/.github/workflows/should_build.yaml@main
    with:
      working_directory: Assistant

  check-server:
    uses: negretenico/GithubWorkflows/.github/workflows/should_build.yaml@main
    with:
      working_directory: Server

  build:
    needs: [check-assistant, check-server]
    if: needs.check-assistant.outputs.should-build == 'true' || needs.check-server.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and test all modules
        run: mvn clean verify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
